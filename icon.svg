<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <rect width="128" height="128" rx="18" fill="#1a1d2e"/>
  <rect width="128" height="128" rx="18" fill="url(#grad)" opacity="0.5"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00e5a0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0077ff" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <!-- Chaves { } -->
  <text x="64" y="78" font-family="monospace" font-size="62" font-weight="bold"
    fill="url(#textgrad)" text-anchor="middle">{}</text>
  <defs>
    <linearGradient id="textgrad" x1="0" y1="0" x2="128" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00e5a0"/>
      <stop offset="100%" stop-color="#0077ff"/>
    </linearGradient>
  </defs>
  <!-- Ponto decorativo -->
  <circle cx="64" cy="100" r="4" fill="#00e5a0" opacity="0.6"/>
</svg>
